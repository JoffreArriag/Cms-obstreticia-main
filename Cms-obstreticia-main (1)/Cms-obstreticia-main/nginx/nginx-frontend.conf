# ─────────────────────────────────────────────────────────────────────────────
# NGINX — API Gateway / Gatekeeper para CMS Obstetricia
# Responsabilidades:
#   1. Servir el frontend Angular (SPA con HTML5 routing)
#   2. Redirigir /api/* al backend .NET
#   3. Redirigir /media/* al backend .NET (subida de imágenes)
#   4. Cabeceras de seguridad básicas
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Cabeceras de seguridad ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection "1; mode=block"      always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Proxy → .NET API (/api/*) ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:5115;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeout para uploads de imágenes
        proxy_read_timeout    120s;
        proxy_connect_timeout  30s;
        client_max_body_size   20m;
    }

    # ── Proxy → .NET API (/media/*) ───────────────────────────────────────
    location /media/ {
        proxy_pass         http://api:5115;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    # ── Angular SPA — HTML5 routing ───────────────────────────────────────
    # Archivos estáticos con caché larga (Angular los versiona con hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cualquier otra ruta → index.html (Angular maneja el router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
