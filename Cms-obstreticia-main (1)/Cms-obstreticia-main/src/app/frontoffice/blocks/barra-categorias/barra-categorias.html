<div class="wiki-bar">
  <div class="wiki-title">
    <h1>UG <strong>wiki</strong></h1>
  </div>

  <nav class="wiki-nav">
    <ul class="nav-list">
      <li>
        <button
          class="nav-btn"
          [class.active]="categoriaActiva === null"
          (click)="navegarATodos()"
        >
          Todos
        </button>
      </li>
      <li *ngFor="let cat of categorias">
        <button
          class="nav-btn"
          [class.active]="categoriaActiva === cat.slug"
          (click)="navegarACategoria(cat.slug)"
        >
          {{ cat.nombre }}
        </button>
      </li>
    </ul>
  </nav>

  <div class="nav-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.35-4.35"/>
    </svg>
    <span>Buscar artículos...</span>
  </div>
</div>
