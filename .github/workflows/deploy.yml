name: CI/CD Pipeline - CMS Obstetricia

# ─── TRIGGERS ────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ─── JOBS ────────────────────────────────────────────────────
jobs:

  # ── Job 1: Build Angular ──────────────────────────────────
  build-angular:
    name: Build Angular
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Cms-obstreticia-main (1)/Cms-obstreticia-main/package-lock.json'

      - name: 📦 Instalar dependencias (npm install)
        working-directory: 'Cms-obstreticia-main (1)/Cms-obstreticia-main'
        run: npm install

      - name: 🔨 Build Angular producción (ng build --prod)
        working-directory: 'Cms-obstreticia-main (1)/Cms-obstreticia-main'
        run: npx ng build --configuration production

  # ── Job 2: Build .NET ─────────────────────────────────────
  build-dotnet:
    name: Build .NET
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔵 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🔨 Build .NET Release (dotnet build -c Release)
        working-directory: Backend_CMS_Vinculacion
        run: dotnet build CMS_Vinculacion.sln -c Release

  # ── Job 3: Test Angular (P1) ──────────────────────────────
  test-angular:
    name: Test Angular
    runs-on: ubuntu-latest
    needs: build-angular

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Cms-obstreticia-main (1)/Cms-obstreticia-main/package-lock.json'

      - name: 📦 Instalar dependencias
        working-directory: 'Cms-obstreticia-main (1)/Cms-obstreticia-main'
        run: npm install

      - name: 🧪 Instalar Chrome (para Karma)
        uses: browser-actions/setup-chrome@v1

      - name: ✅ Ejecutar tests Angular (ng test)
        working-directory: 'Cms-obstreticia-main (1)/Cms-obstreticia-main'
        continue-on-error: true
        run: npx ng test --watch=false --code-coverage --browsers=ChromeHeadless

  # ── Job 4: Test .NET - Solo unitarios (P2) ────────────────
  test-dotnet:
    name: Test .NET
    runs-on: ubuntu-latest
    needs: build-dotnet

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔵 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: ✅ Ejecutar tests unitarios (Article.UnitTests)
        working-directory: Backend_CMS_Vinculacion
        run: dotnet test CMSVinculacion.Api/UnitTests/Article.UnitTests/Article.UnitTests.csproj --verbosity normal

      - name: ✅ Ejecutar tests unitarios (Backend.Tests - excluir integración)
        working-directory: Backend_CMS_Vinculacion
        run: dotnet test Backend.Tests/Backend.Tests.csproj --verbosity normal --filter "FullyQualifiedName!~IntegrationTests"

  # ── Job 5: Docker build + push (T-25) ─────────────────────
  docker:
    name: Docker build + push
    runs-on: ubuntu-latest
    needs: [test-angular, test-dotnet]

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐳 Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🔨 Build + Push imagen Backend .NET
        uses: docker/build-push-action@v5
        with:
          context: ./Backend_CMS_Vinculacion
          file: ./Backend_CMS_Vinculacion/Dockerfile
          push: true
          tags: joffrea/cms-obstetricia-backend:latest

      - name: 🔨 Build + Push imagen Frontend Angular
        uses: docker/build-push-action@v5
        with:
          context: './Cms-obstreticia-main (1)/Cms-obstreticia-main'
          file: './Cms-obstreticia-main (1)/Cms-obstreticia-main/Dockerfile'
          push: true
          tags: joffrea/cms-obstetricia-frontend:latest

  # ── Job 6: Deploy SSH al VPS Oracle Cloud (T-26) ──────────
  deploy:
    name: Deploy SSH - VPS Hostinger
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: 🚀 Deploy via SSH (appleboy/ssh-action)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            docker compose pull
            docker compose up -d

      # ── Método alternativo comentado para referencia ───────
      # - name: 🚀 Deploy alternativo
      #   uses: appleboy/ssh-action@master
      #   with:
      #     host: ${{ secrets.VPS_HOST }}
      #     username: ${{ secrets.VPS_USER }}
      #     key: ${{ secrets.VPS_SSH_KEY }}
      #     script: |
      #       cd /home/ubuntu/app
      #       docker compose pull && docker compose up -d